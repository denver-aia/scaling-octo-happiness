/* ── We Offer – brand logo grid ───────────────────────────────────────────── */
#kpdi-we-offer { background:#fff; padding: 80px 0 90px; text-align: center; }
#kpdi-we-offer .kpdi-we-offer-title {
  font-family: Arial, sans-serif;
  font-size: 2rem;
  font-weight: 700;
  color: #1a56a0;
  margin: 0 0 50px;
  letter-spacing: 1px;
  text-transform: none;
}
.kpdi-logos-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 20px;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px;
}
.kpdi-logo-card {
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 6px;
  padding: 28px 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: default;
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  min-height: 110px;
}
.kpdi-logo-card:hover {
  transform: translateY(-5px) scale(1.04);
  box-shadow: 0 12px 30px rgba(0,0,0,0.12);
  border-color: #c0c8d8;
}
.kpdi-logo-card img {
  max-width: 100%;
  max-height: 80px;
  width: auto;
  height: auto;
  object-fit: contain;
  display: block;
  transition: filter 0.25s ease;
  filter: grayscale(25%);
}
