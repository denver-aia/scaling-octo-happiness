<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 100" width="240" height="100">
  <rect width="240" height="100" fill="white"/>
  <!-- Circular emblem (simplified from actual golden seal) -->
  <circle cx="42" cy="50" r="32" fill="none" stroke="#C8A000" stroke-width="3"/>
  <circle cx="42" cy="50" r="24" fill="none" stroke="#C8A000" stroke-width="1.5"/>
  <!-- NAPCO letters in the circle -->
  <text x="42" y="46" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#00337A">NATIONAL</text>
  <text x="42" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#00337A">ALUMINIUM</text>
  <!-- NAPCO main text -->
  <text x="155" y="43" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="26" font-weight="900" fill="#00337A" letter-spacing="2">NAPCO</text>
  <text x="155" y="63" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#C8A000" letter-spacing="1">OMAN</text>
</svg>
